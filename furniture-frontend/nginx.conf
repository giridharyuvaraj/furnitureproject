server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy API requests to backend for deployment symmetry 
    # but normally frontend should call backend URL from ENV vars
    # location /api/ {
    #     proxy_pass http://backend-service:8080/;
    # }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
